name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # MOCK: full UI + config/subscription engine, NO native binaries (installable demo).
  mock-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: android-actions/setup-android@v3
      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses >/dev/null 2>&1 || true

      - name: Build mock debug APK
        run: ./gradlew assembleMockDebug --no-daemon --stacktrace

      - name: Stage APK (fixed name for stable download link)
        run: |
          mkdir -p out
          cp app/build/outputs/apk/mock/debug/*.apk out/SmoothVPN-demo.apk
          ls -lh out

      - uses: actions/upload-artifact@v4
        with:
          name: SmoothVPN-demo-apk
          path: out/SmoothVPN-demo.apk
          if-no-files-found: error

      - name: Publish demo APK to 'latest' release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          files: out/SmoothVPN-demo.apk

  # FULL: real tunnel. Builds Xray-core (libv2ray.aar) + hev bridge, then the APK.
  full-apk:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: android-actions/setup-android@v3
      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses >/dev/null 2>&1 || true
      - name: Install NDK
        run: |
          yes | sdkmanager "ndk;26.1.10909125" >/dev/null
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> "$GITHUB_ENV"
      - uses: actions/setup-go@v5
        with: { go-version: '1.26' }

      - name: Build libv2ray.aar (Xray-core)
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          export PATH="$PATH:$(go env GOPATH)/bin"
          git clone --depth=1 https://github.com/2dust/AndroidLibXrayLite
          cd AndroidLibXrayLite
          gomobile init
          go mod tidy
          gomobile bind -v -target=android -androidapi 24 -trimpath -ldflags='-s -w -buildid= -checklinkname=0' -o ../app/libs/libv2ray.aar ./
          cd .. && ls -lh app/libs/libv2ray.aar

      - name: Build hev-socks5-tunnel (.so)
        run: |
          git clone --recursive --depth=1 https://github.com/heiher/hev-socks5-tunnel
          TMP=$(mktemp -d); mkdir -p "$TMP/jni"
          echo 'include $(call all-subdir-makefiles)' > "$TMP/jni/Android.mk"
          ln -s "$PWD/hev-socks5-tunnel" "$TMP/jni/hev-socks5-tunnel"
          "$ANDROID_NDK_HOME/ndk-build" \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT="$TMP/jni/Android.mk" \
            "APP_ABI=armeabi-v7a arm64-v8a x86_64" \
            APP_PLATFORM=android-24 \
            NDK_LIBS_OUT="$TMP/libs" NDK_OUT="$TMP/obj" \
            "APP_CFLAGS=-O3 -DPKGNAME=com/smoothvpn/service" \
            "APP_LDFLAGS=-Wl,--build-id=none -Wl,--hash-style=gnu"
          mkdir -p app/src/main/jniLibs
          cp -r "$TMP/libs/"* app/src/main/jniLibs/

      - name: Build full debug APK
        run: ./gradlew assembleFullDebug --no-daemon --stacktrace

      - name: Stage APK (fixed name for stable download link)
        run: |
          mkdir -p out
          cp app/build/outputs/apk/full/debug/*.apk out/SmoothVPN.apk
          ls -lh out

      - uses: actions/upload-artifact@v4
        with:
          name: SmoothVPN-full-apk
          path: out/SmoothVPN.apk
          if-no-files-found: error

      - name: Publish full APK to 'latest' release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          files: out/SmoothVPN.apk
